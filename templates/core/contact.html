{% extends 'core/base.html' %}
{% block title %}Contact{% endblock %}
{% block content %}
<section class="section-padding" style="background:var(--bg-secondary);">
  <div class="container">
    <h2 class="section-title">Contact</h2>

    <div style="padding:1.5rem; border-radius:1rem; border:1px solid var(--bg-tertiary); background:var(--bg-primary);">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit" style="margin-top:0.5rem; width:auto;">Send</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
